<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6FA;color:#1a1a2e;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.card{background:#fff;border:1px solid #e4e8f0;border-radius:12px;padding:1.1rem 1.3rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:9px;border:none;background:transparent;color:#6c757d;width:100%;font-size:13px;font-weight:400;text-align:left;margin-bottom:3px;transition:all .15s;cursor:pointer}
.nav-btn:hover{background:#f0f4ff;color:#2563eb}
.nav-btn.active{background:#EEF3FF;color:#2563eb;font-weight:700}
.tab-btn{padding:7px 18px;border-radius:7px;border:none;background:transparent;color:#6c757d;font-size:12.5px;font-weight:400;transition:all .15s;cursor:pointer}
.tab-btn.active{background:#fff;color:#1a1a2e;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.10)}
.badge{display:inline-block;border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700}
.btn{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#1D9E75;color:#fff}
.btn-secondary{background:#f0f2f5;color:#6c757d;border:1px solid #dee2e6}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#6c757d;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-control{width:100%;padding:8px 12px;border:1.5px solid #dee2e6;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s;background:#fff}
.form-control:focus{border-color:#2563eb}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #e4e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;animation:fadeIn .2s ease}
.toast.success{background:#1D9E75}
.toast.error{background:#dc3545}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
tr:hover td{background:#f8f9fb}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;z-index:200!important}
  .sidebar.open{transform:translateX(0)!important}
  .main-content{margin-left:0!important;padding:1rem!important}
  .hamburger{display:flex!important}
  .tab-btn{font-size:10px!important;padding:4px 7px!important}
  .page-header-tabs{flex-wrap:wrap!important;gap:4px!important}
}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:300;background:#fff;border:1px solid #e4e8f0;border-radius:8px;padding:7px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);flex-direction:column;gap:4px}
.hamburger span{width:20px;height:2px;background:#333;display:block;border-radius:2px}
.mobile-only{display:none}
.desktop-only{display:block}
@media(max-width:768px){.mobile-only{display:block}.desktop-only{display:none}}
</style>
</head>

function Toast({msg,type,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);return <div className={`toast ${type}`}>{msg}</div>;}
function Av({id,size=32}){return <div style={{width:size,height:size,borderRadius:"50%",background:AC[id]||"#888",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.33,fontWeight:700,color:"#fff",flexShrink:0}}>{id||"?"}</div>;}
function Badge({estado}){const c=ESTADOS[estado]||{bg:"#eee",text:"#333"};return <span className="badge" style={{background:c.bg,color:c.text}}>{estado}</span>;}
function Spin(){return <div style={{display:"flex",justifyContent:"center",padding:"3rem"}}><div className="spinner"/></div>;}
function Stat({label,value,color="#1D9E75",sub}){return <div className="card" style={{flex:1,minWidth:110}}><p style={{fontSize:11,color:"#6c757d",margin:"0 0 4px",fontWeight:600}}>{label}</p><p style={{fontSize:26,fontWeight:800,margin:0,color,letterSpacing:-1}}>{value}</p>{sub&&<p style={{fontSize:11,color:"#adb5bd",margin:"3px 0 0"}}>{sub}</p>}</div>;}
function Modal({title,onClose,children}){return <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div className="modal"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}><h3 style={{fontSize:16,fontWeight:700,margin:0}}>{title}</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#adb5bd",lineHeight:1}}>×</button></div>{children}</div></div>;}
function MapaProp({direccion,nombre}){if(!direccion)return <div style={{height:180,background:"#f0f2f5",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#adb5bd",fontSize:12}}>Sin dirección cargada</div>;const q=encodeURIComponent(direccion);const url=`https://maps.google.com/maps?q=${q}&output=embed&z=16`;return <div style={{borderRadius:8,overflow:"hidden",border:"1px solid #e0e0e0",height:180}}><iframe src={url} width="100%" height="180" style={{border:"none",display:"block"}} title={nombre} loading="lazy" referrerPolicy="no-referrer-when-downgrade"/></div>;}

function PieChart({data}){
  if(!data||data.length===0)return <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"#adb5bd"}}>Sin datos</div>;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const cx=120,cy=100,r=80;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{const sweep=d.value/total*2*Math.PI;const start=angle;angle+=sweep;return{...d,start,sweep};});
  const arcPath=(s,sw)=>{if(sw>=2*Math.PI-0.001){return `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r} Z`;}const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);const x2=cx+r*Math.cos(s+sw),y2=cy+r*Math.sin(s+sw);const large=sw>Math.PI?1:0;return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;};
  const labelPos=(s,sw)=>{const mid=s+sw/2;return{x:cx+r*0.65*Math.cos(mid),y:cy+r*0.65*Math.sin(mid)};};
  return <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
    <svg viewBox="0 0 240 200" style={{width:200,flexShrink:0}}>
      {slices.map((s,i)=><g key={i}><path d={arcPath(s.start,s.sweep)} fill={s.color} stroke="#fff" strokeWidth="2"/>{s.sweep>0.3&&<text x={labelPos(s.start,s.sweep).x} y={labelPos(s.start,s.sweep).y+4} textAnchor="middle" fontSize="11" fill="#fff" fontWeight="700">{s.value}</text>}</g>)}
    </svg>
    <div style={{flex:1,minWidth:120}}>{slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:12,height:12,background:s.color,borderRadius:2,flexShrink:0}}/><span style={{fontSize:12,color:"#6c757d",flex:1}}>{s.label}</span><span style={{fontWeight:700,fontSize:13}}>{s.value}</span><span style={{fontSize:11,color:"#adb5bd"}}>({Math.round(s.value/total*100)}%)</span></div>)}</div>
  </div>;
}

function Gauge({valor,max,objetivo,color,label}){
  const sm=max>0?max:1;
  const pct=Math.min(valor/sm,1)*100;
  const op=Math.min(objetivo/sm,1)*100;
  const superaObj=valor>=objetivo;
  return <div style={{width:"100%",padding:"4px 0"}}>
    {label&&<p style={{margin:"0 0 6px",fontSize:12,color:"#6c757d",fontWeight:700,textAlign:"center"}}>{label}</p>}
    <div style={{position:"relative",height:28,background:"#e8eaf0",borderRadius:14,margin:"16px 0 6px"}}>
      {pct>0&&<div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:color,borderRadius:14,transition:"width .6s"}}/>}
      <div style={{position:"absolute",top:-10,left:`calc(${op}% - 1.5px)`,height:48,width:3,background:"#dc3545",borderRadius:2,zIndex:5}}/>
      <div style={{position:"absolute",top:-22,left:`${op}%`,transform:"translateX(-50%)",fontSize:10,color:"#dc3545",fontWeight:700,whiteSpace:"nowrap"}}>{objetivo.toFixed(2)}</div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#adb5bd",marginBottom:8}}>
      <span>0</span><span style={{color:"#6c757d"}}>{(sm/2).toFixed(2)}</span><span>{sm.toFixed(2)}</span>
    </div>
    <div style={{textAlign:"center"}}>
      <span style={{fontSize:28,fontWeight:900,color:superaObj?color:"#dc3545"}}>{valor.toFixed(4)}</span>
      <span style={{display:"block",fontSize:11,color:superaObj?"#1D9E75":"#dc3545",fontWeight:700,marginTop:2}}>{superaObj?"✓ Sobre objetivo":"✗ Bajo objetivo"}</span>
    </div>
  </div>;
}

function Treemap({data,height=130}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;let x=0,rects=[];
  data.forEach(d=>{const w=Math.round(d.value/total*540);rects.push({...d,x,w});x+=w;});
  return <svg viewBox={`0 0 540 ${height}`} style={{width:"100%",borderRadius:8,overflow:"hidden"}}>
    {rects.map((r,i)=><g key={i}><rect x={r.x} y={0} width={r.w} height={height} fill={r.color}/>{r.w>45&&<text x={r.x+8} y={height-12} fontSize="13" fontWeight="700" fill="#fff">{r.value}</text>}{r.w>65&&<text x={r.x+8} y={20} fontSize="11" fill="rgba(255,255,255,.9)" fontWeight="600">{r.label}</text>}</g>)}
  </svg>;
}

function BarChart({data}){
  if(!data||data.length===0)return <div style={{height:140,display:"flex",alignItems:"center",justifyContent:"center",color:"#adb5bd",fontSize:12,background:"#f8f9fa",borderRadius:8}}>Sin datos de portales</div>;
  const W=500,H=160,pL=34,pB=28,pT=8,pR=6,cW=W-pL-pR,cH=H-pB-pT;
  const maxY=Math.max(...data.map(d=>(d.zonaprop||0)+(d.argenprop||0)+(d.mercadolibre||0)))*1.15||10;
  const bW=Math.min(26,cW/data.length-4);
  const colors=["#185FA5","#1D9E75","#BA7517"];
  const keys=["zonaprop","argenprop","mercadolibre"];
  const xP=(i)=>pL+(i+.5)*(cW/data.length);
  const yP=(v)=>pT+cH-(v/maxY)*cH;
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%"}}>
    {[0,.25,.5,.75,1].map(t=><line key={t} x1={pL} x2={W-pR} y1={pT+cH*(1-t)} y2={pT+cH*(1-t)} stroke="#eef0f3" strokeWidth="1"/>)}
    {data.map((d,i)=>{let base=0;return keys.map((k,ki)=>{const v=d[k]||0;const y=yP(base+v);const h=(v/maxY)*cH;base+=v;return <rect key={k} x={xP(i)-bW/2} y={y} width={bW} height={h} fill={colors[ki]} rx={ki===2?3:0}/>;});})}
    {data.map((d,i)=><text key={i} x={xP(i)} y={H-6} textAnchor="middle" fontSize="8" fill="#bbb">{`${ML[d.mes]}'${String(d.anio).slice(2)}`}</text>)}
    {[0,Math.round(maxY*.5),Math.round(maxY)].map((v,i)=><text key={i} x={pL-4} y={yP(v)+4} textAnchor="end" fontSize="9" fill="#bbb">{v>=1000?`${Math.round(v/1000)}k`:v}</text>)}
  </svg>;
}

  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleCreateDriveFolder=()=>{

    <div className="form-group"><label>Argenprop</label><input className="form-control" type="number" value={f.argenprop} onChange={e=>set("argenprop",e.target.value)}/></div>
    <div className="form-group"><label>MercadoLibre</label><input className="form-control" type="number" value={f.mercadolibre} onChange={e=>set("mercadolibre",e.target.value)}/></div>

  <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
    <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>

            <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 12px"}}><span style={{fontSize:11,color:"#0A5C34",fontWeight:600}}>🎯 Objetivo:</span><input type="number" min={0} max={1} step={0.01} value={objHitInput} onChange={e=>setObjHitInput(e.target.value)} style={{width:70,padding:"4px 8px",border:"1.5px solid #A5D6A7",borderRadius:6,fontSize:13,textAlign:"center"}} onBlur={()=>setObjHit(Number(objHitInput)||0)}/><button onClick={()=>setObjHit(Number(objHitInput)||0)} style={{padding:"4px 10px",background:"#1D9E75",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"}}>✓</button></div>
          </div>
        </div>
        <div className="card">
          <p style={{fontWeight:700,fontSize:13,margin:"0 0 10px",color:"#6c757d"}}>Carpetas por tipo</p>
          <PieChart data={tmData}/>
          <div style={{marginTop:"1rem",padding:"12px",background:"#f8f9fc",borderRadius:10}}>
            <p style={{margin:"0 0 8px",fontWeight:700,fontSize:12,color:"#6c757d"}}>Funnel de conversión</p>
            {[{l:"Propiedades",v:props.length,c:"#2563eb"},{l:"Leads",v:leads.length,c:"#1D9E75"},{l:"Visitas físicas",v:visitas.length,c:"#BA7517"},{l:"Vendidas",v:props.filter(p=>p.estado==="VE").length,c:"#7F77DD"}].map((it,i)=><div key={i} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:"#6c757d"}}>{it.l}</span><span style={{fontWeight:700}}>{it.v}</span></div><div style={{background:"#e4e8f0",borderRadius:4,height:6}}><div style={{width:`${Math.min(it.v/(props.length||1)*100,100)}%`,height:"100%",background:it.c,borderRadius:4}}/></div></div>)}
          </div>
        </div>
      </div>
      <div style={{marginTop:24,textAlign:"center"}}>
        <p style={{fontSize:11,color:"#6c757d",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Diagrama de flujo — Origen de los KPIs</p>
        <img src="kpi-diagram.png" alt="Diagrama KPIs" style={{maxWidth:"100%",borderRadius:8,border:"1px solid #e0e0e0"}}/>
      </div>
    </div>}
    {tab==="cartera"&&<div>
      <p style={{textAlign:"center",fontWeight:800,fontSize:17,margin:"0 0 1rem"}}>ANÁLISIS DE CARTERA</p>
      <div className="card" style={{marginBottom:"1rem",padding:"12px 16px",background:"#f8f9fc"}}>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#6c757d"}}>📅 Período:</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,color:"#6c757d"}}>Desde</span><input type="month" value={periodoDesde} onChange={e=>setPeriodoDesde(e.target.value)} style={{padding:"5px 10px",border:"1.5px solid #dee2e6",borderRadius:7,fontSize:13,outline:"none"}}/></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,color:"#6c757d"}}>Hasta</span><input type="month" value={periodoHasta} onChange={e=>setPeriodoHasta(e.target.value)} style={{padding:"5px 10px",border:"1.5px solid #dee2e6",borderRadius:7,fontSize:13,outline:"none"}}/></div>
          <button onClick={()=>{setPeriodoDesde("");setPeriodoHasta("");}} style={{padding:"5px 12px",fontSize:12,borderRadius:7,border:"1px solid #dee2e6",background:"#fff",color:"#6c757d",cursor:"pointer"}}>Reset</button>
          <span style={{fontSize:11,color:"#adb5bd"}}>{propsFiltradas.length} carpetas en período</span>
        </div>
      </div>
      <div style={{background:"linear-gradient(135deg,#f0fff4,#fffbf0)",border:"2px solid #c6e6d0",borderRadius:14,padding:20,marginBottom:"1.25rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
          <div style={{textAlign:"center"}}><p style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:"#0A5C34"}}>VENTA PROBABLE</p><p style={{margin:"0 0 4px",fontSize:11,color:"#adb5bd"}}>Σ(Precio × GET) propiedades PU</p><p style={{margin:"4px 0 8px",fontSize:32,fontWeight:900,color:"#1D9E75"}}>{fK(ventaProb)}</p><div style={{background:"#D1F0E4",borderRadius:10,padding:"10px 16px"}}><p style={{margin:0,fontSize:11,color:"#0A5C34",fontWeight:700}}>CARTERA DE VENTA (TOTAL PU)</p><p style={{margin:0,fontSize:24,fontWeight:900,color:"#1D9E75"}}>{fK(totPU)}</p></div></div>
          <div style={{textAlign:"center"}}><p style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:"#856404"}}>CAPTACIÓN PROBABLE</p><p style={{margin:"0 0 4px",fontSize:11,color:"#adb5bd"}}>Σ(ACM × GO) propiedades CA</p><p style={{margin:"4px 0 8px",fontSize:32,fontWeight:900,color:"#BA7517"}}>{fK(captProb)}</p><div style={{background:"#FFF3CD",borderRadius:10,padding:"10px 16px"}}><p style={{margin:0,fontSize:11,color:"#856404",fontWeight:700}}>CARTERA A CAPTAR (TOTAL CA)</p><p style={{margin:0,fontSize:24,fontWeight:900,color:"#BA7517"}}>{fK(totCA)}</p></div></div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
        <div className="card"><p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#6c757d"}}>CARPETAS POR ESTADO</p>
          <Treemap data={[{label:"NO",value:propsFiltradas.filter(p=>p.estado==="NO").length,color:"#888"},{label:"VE",value:propsFiltradas.filter(p=>p.estado==="VE").length,color:"#7F77DD"},{label:"TE",value:propsFiltradas.filter(p=>p.estado==="TE").length,color:"#C0392B"},{label:"PU",value:propsFiltradas.filter(p=>p.estado==="PU").length,color:"#1D9E75"},{label:"CA",value:propsFiltradas.filter(p=>p.estado==="CA").length,color:"#BA7517"}].filter(d=>d.value>0)} height={140}/>
        </div>
        <div className="card"><p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#6c757d"}}>RESUMEN POR ESTADO</p>
          <table style={{width:"100%",fontSize:12}}><thead><tr style={{background:"#f8f9fc"}}>{["Estado","Cant.","Valor","% total"].map(h=><th key={h} style={{padding:"7px 8px",color:"#6c757d",fontWeight:600,borderBottom:"2px solid #e4e8f0"}}>{h}</th>)}</tr></thead><tbody>{[{e:"CA",c:"#BA7517",v:totCA},{e:"PU",c:"#1D9E75",v:totPU},{e:"VE",c:"#7F77DD",v:totVE},{e:"TE",c:"#C0392B",v:totTE},{e:"NO",c:"#888",v:totNO}].map(row=>{const cnt=props.filter(p=>p.estado===row.e).length;return <tr key={row.e} style={{borderBottom:"1px solid #f0f2f5"}}><td style={{padding:"7px 8px"}}><span style={{background:row.c,color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>{row.e}</span></td><td style={{padding:"7px 8px",fontWeight:800,color:row.c}}>{cnt}</td><td style={{padding:"7px 8px",fontWeight:600}}>{fK(row.v)}</td><td style={{padding:"7px 8px",color:row.c,fontWeight:700}}>{Math.round(row.v/total*100)}%</td></tr>;})}</tbody></table>
        </div>
      </div>
    </div>}
    {tab==="agentes"&&<GestionAgentes agentes={agentes} onRefresh={onRefresh} toast={toast}/>}
  </div>;
}


function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const handleLogin=async(e)=>{
    e.preventDefault();
    if(!email||!password){setError("Completá email y contraseña");return;}
    setLoading(true);setError("");
    const{error:err}=await sb.auth.signInWithPassword({email,password});
    setLoading(false);
    if(err){setError("Email o contraseña incorrectos");}
    else{onLogin();}
  };
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{background:"#fff",borderRadius:16,padding:"2.5rem",width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
      <div style={{textAlign:"center",marginBottom:"2rem"}}>
        <img src={LOGO_SRC} style={{height:60,width:"auto",margin:"0 auto 12px",display:"block"}} alt="SOCOSI"/>
        <p style={{fontSize:13,color:"#adb5bd",margin:0}}>Sistema de gestión inmobiliaria · Acceso restringido</p>
      </div>
      <form onSubmit={handleLogin}>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6c757d",marginBottom:6,textTransform:"uppercase"}}>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" autoComplete="email"
            style={{width:"100%",padding:"10px 14px",border:"1.5px solid #dee2e6",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6c757d",marginBottom:6,textTransform:"uppercase"}}>Contraseña</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" autoComplete="current-password"
            style={{width:"100%",padding:"10px 14px",border:"1.5px solid #dee2e6",borderRadius:8,fontSize:14,outline:"none"}}/>
        </div>
        {error&&<div style={{background:"#fff0f1",border:"1px solid #f1aeb5",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#842029"}}>⚠ {error}</div>}
        <button type="submit" disabled={loading}
          style={{width:"100%",padding:"12px",background:loading?"#adb5bd":"#CC2229",color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"Ingresando...":"Ingresar"}
        </button>
      </form>
    </div>
  </div>;
}

function Publicaciones({props,leads,visitas,metricas}){
  const [fEstado,setFEstado]=useState(["CA","PU"]);
  const [propSel,setPropSel]=useState(null);
  const propsFiltradas=useMemo(()=>{
    if(fEstado.length>0)return props.filter(p=>fEstado.includes(p.estado));
    return props.filter(p=>p.estado==="CA"||p.estado==="PU");
  },[props,fEstado]);
  useEffect(()=>{if(propsFiltradas.length>0&&(!propSel||!propsFiltradas.find(p=>p.id===propSel?.id)))setPropSel(propsFiltradas[0]);},[propsFiltradas]);
  const prop=propSel;
  const propMet=useMemo(()=>{if(!prop)return[];return metricas.filter(m=>m.propiedad_nombre===prop.nombre||m.propiedad_nombre?.startsWith(prop.nombre?.split(' ').slice(0,2).join(' '))).sort((a,b)=>a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes);},[prop,metricas]);
  const propLeads=prop?leads.filter(l=>l.propiedad_id===prop.id||(l.propiedad_nombre&&(l.propiedad_nombre===prop.nombre||l.propiedad_nombre===prop.nombre?.trim()))):[];
  const propVis=prop?visitas.filter(v=>v.propiedad_nombre===prop.nombre):[];
  const venc=prop?isVenc(prop.aut_venc):false;
  const leadsSem=propLeads.filter(l=>new Date(l.fecha)>new Date(Date.now()-7*86400000));
  const ML2=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const LineChart=({data})=>{
    if(!data||data.length===0)return <div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"#adb5bd",fontSize:13,background:"#f8f9fa",borderRadius:8}}>Sin datos de portales para esta propiedad</div>;
    const W=500,H=200,pL=36,pB=28,pT=14,pR=8,cW=W-pL-pR,cH=H-pB-pT;
    const stacked=data.map(d=>({...d,s1:d.argenprop||0,s2:(d.argenprop||0)+(d.mercadolibre||0),s3:(d.argenprop||0)+(d.mercadolibre||0)+(d.zonaprop||0)}));
    const maxY=Math.max(...stacked.map(d=>d.s3))*1.12||10;
    const n=data.length;
    const xP=(i)=>n===1?pL+cW/2:pL+(i/(n-1))*cW;
    const yP=(v)=>pT+cH-(v/maxY)*cH;
    const portales=[{key:"argenprop",top:"s1",color:"#1D9E75",fill:"rgba(29,158,117,.3)"},{key:"mercadolibre",top:"s2",color:"#BA7517",fill:"rgba(186,117,23,.3)"},{key:"zonaprop",top:"s3",color:"#185FA5",fill:"rgba(24,95,165,.3)"}];
    const area=(botKey,topKey)=>{const tp=stacked.map((d,i)=>`${i===0?"M":"L"}${xP(i)},${yP(d[topKey])}`).join(" ");const bt=stacked.slice().reverse().map((d,i,a)=>`L${xP(a.length-1-i)},${yP(botKey?d[botKey]:0)}`).join(" ");return tp+" "+bt+"Z";};
    const line=(topKey)=>stacked.map((d,i)=>`${i===0?"M":"L"}${xP(i)},${yP(d[topKey])}`).join(" ");
    return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible"}}>
      {[0,.25,.5,.75,1].map(t=><line key={t} x1={pL} x2={W-pR} y1={pT+cH*(1-t)} y2={pT+cH*(1-t)} stroke="#eef0f3" strokeWidth="1"/>)}
      {portales.map((p,i)=><path key={p.key} d={area(i===0?null:portales[i-1].top,p.top)} fill={p.fill}/>)}
      {portales.map(p=><path key={p.key+"l"} d={line(p.top)} fill="none" stroke={p.color} strokeWidth="2" strokeLinejoin="round"/>)}
      {portales.map((p,pi)=>stacked.map((d,i)=>{const v=d[p.key];if(!v&&d.s3===0)return null;const isTop=pi===portales.length-1;const label=isTop?d.s3:null;return <g key={`${p.key}-${i}`}><circle cx={xP(i)} cy={yP(d[p.top])} r={3} fill={p.color} stroke="#fff" strokeWidth="1"/>{isTop&&label!=null&&(n<=12||i%2===0)&&<text x={xP(i)} y={yP(d[p.top])-6} textAnchor="middle" fontSize="9" fill="#1a1a2e" fontWeight="800">{label}</text>}</g>;}))}
      {stacked.map((d,i)=>(n<=14||i%2===0)&&<text key={i} x={xP(i)} y={H-4} textAnchor="middle" fontSize="8" fill="#bbb">{ML2[d.mes]}'{String(d.anio).slice(2)}</text>)}
      {[0,Math.round(maxY*.5),Math.round(maxY)].map((v,i)=><text key={i} x={pL-4} y={yP(v)+4} textAnchor="end" fontSize="9" fill="#bbb">{v>=1000?`${Math.round(v/1000)}k`:v}</text>)}
    </svg>;
  };
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:21,fontWeight:800,margin:0}}>Publicaciones</h2><Logo size={32}/>
    </div>
    <p style={{textAlign:"center",fontWeight:800,fontSize:15,margin:"0 0 1rem",color:"#1a1a2e"}}>ANÁLISIS DE EVOLUCIÓN DE PUBLICACIONES</p>
    <div className="card" style={{marginBottom:"1rem",padding:"10px 14px"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#6c757d",fontWeight:700}}>Estado:</span>
        {["CA","PU","VE","TE","NO"].map(e=>{const c=ESTADOS[e];const act=fEstado.includes(e);return <button key={e} onClick={()=>act?setFEstado(fEstado.filter(x=>x!==e)):setFEstado([...fEstado,e])} style={{padding:"4px 12px",borderRadius:6,border:`2px solid ${act?c.dot:"#dee2e6"}`,background:act?c.bg:"#fff",color:act?c.text:"#6c757d",fontWeight:act?700:400,fontSize:12,cursor:"pointer"}}>{e}</button>;})}
        <span style={{fontSize:11,color:"#adb5bd",marginLeft:"auto"}}>{propsFiltradas.length} propiedades</span>
      </div>
    </div>
    {prop&&<div style={{display:"flex",gap:28,marginBottom:"1rem",alignItems:"baseline",flexWrap:"wrap"}}>
      {prop.precio_venta&&<div><p style={{margin:0,fontSize:28,fontWeight:900,color:"#1D9E75"}}>U$S {Number(prop.precio_venta).toLocaleString("es-AR")}</p><p style={{margin:0,fontSize:11,fontWeight:800,color:"#1D9E75"}}>PRECIO VENTA</p></div>}
      {prop.precio_alquiler&&<div><p style={{margin:0,fontSize:28,fontWeight:900,color:"#1D9E75"}}>U$S {Number(prop.precio_alquiler).toLocaleString("es-AR")}</p><p style={{margin:0,fontSize:11,fontWeight:800,color:"#1D9E75"}}>PRECIO ALQUILER</p></div>}
      {prop.precio_acm&&<div><p style={{margin:0,fontSize:28,fontWeight:900,color:"#BA7517"}}>U$S {Number(prop.precio_acm).toLocaleString("es-AR")}</p><p style={{margin:0,fontSize:11,fontWeight:800,color:"#BA7517"}}>VALOR ACM</p></div>}
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:"1rem"}}>
      <div className="card">
        <div style={{display:"flex",gap:14,marginBottom:8,fontSize:11}}>{[["● Argenprop","#1D9E75"],["● MercadoLibre","#BA7517"],["● Zonaprop","#185FA5"]].map(([n,c])=><span key={n} style={{color:c,fontWeight:700}}>{n}</span>)}</div>
        <LineChart data={propMet}/>
        {prop&&<div style={{marginTop:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <div className="card" style={{padding:"10px 14px"}}>
              <p style={{fontWeight:700,fontSize:12,margin:"0 0 4px",color:"#6c757d"}}>AUTORIZACIÓN</p>
              {(()=>{const vencida=prop.aut_venc&&new Date(prop.aut_venc)<=new Date()&&prop.estado==="PU";const prox=prop.aut_venc&&new Date(prop.aut_venc)>new Date()&&new Date(prop.aut_venc)<=new Date(Date.now()+15*24*60*60*1000)&&prop.estado==="PU";
              if(vencida)return <p style={{color:"#dc3545",fontWeight:700,fontSize:12,margin:0}}>⚠ VENCIDA {fDate(prop.aut_venc)}</p>;
              if(prox)return <p style={{color:"#BA7517",fontWeight:700,fontSize:12,margin:0}}>⏰ Vence {fDate(prop.aut_venc)}</p>;
              return <p style={{color:"#1D9E75",fontSize:12,margin:0}}>{prop.aut_venc?`✓ Vigente ${fDate(prop.aut_venc)}`:"Sin fecha cargada"}</p>;})()}
            </div>
            <div className="card" style={{padding:"10px 14px"}}>
              <p style={{fontWeight:700,fontSize:12,margin:"0 0 4px",color:"#6c757d"}}>CONTACTOS ABIERTOS</p>
              {(()=>{const ca=propLeads.filter(l=>l.estado_contacto==="ABIERTO - sin contacto"||l.estado_contacto==="ABIERTO - espera respuesta cliente");
              return ca.length===0?<p style={{color:"#adb5bd",fontSize:12,margin:0}}>Sin contactos abiertos</p>:
              <div>{ca.slice(0,3).map(l=>{const ec=l.estado_contacto||"";const color=ec.includes("sin contacto")?"#BA7517":"#2563eb";return <div key={l.id} style={{fontSize:11,marginBottom:2}}><span style={{fontWeight:600}}>{l.cliente_nombre}</span> <span style={{color,fontWeight:700}}>{ec.replace("ABIERTO - ","")}</span></div>;})}{ca.length>3&&<p style={{fontSize:10,color:"#adb5bd",margin:"2px 0 0"}}>+{ca.length-3} más</p>}</div>;})()}
            </div>
            <div className="card" style={{padding:"10px 14px"}}>
              <p style={{fontWeight:700,fontSize:12,margin:"0 0 4px",color:"#6c757d"}}>VISITAS ABIERTAS</p>
              {(()=>{const va=propVis.filter(v=>(v.estado_visita||v.resultado)==="ABIERTA"||(v.estado_visita||v.resultado)==="RESERVA");
              return va.length===0?<p style={{color:"#adb5bd",fontSize:12,margin:0}}>Sin visitas abiertas</p>:
              <div>{va.slice(0,3).map(v=>{const st=v.estado_visita||v.resultado||"ABIERTA";const color=st==="RESERVA"?"#1D9E75":"#BA7517";return <div key={v.id} style={{fontSize:11,marginBottom:2}}><span style={{fontWeight:600}}>{v.nombre_visita||"—"}</span> <span style={{color,fontWeight:700}}>{st}</span></div>;})}{va.length>3&&<p style={{fontSize:10,color:"#adb5bd",margin:"2px 0 0"}}>+{va.length-3} más</p>}</div>;})()}
            </div>
          </div>
        </div>}
      </div>
      <div className="card" style={{display:"flex",flexDirection:"column",gap:10}}>
        <p style={{margin:0,fontSize:10,fontWeight:700,color:"#6c757d",letterSpacing:.8}}>PROPIEDAD</p>
        <select value={prop?.id||""} onChange={e=>{const p=propsFiltradas.find(x=>x.id===e.target.value);if(p)setPropSel(p);}} style={{width:"100%",padding:"7px 10px",fontSize:13,borderRadius:8,border:"1.5px solid #dee2e6",background:"#f0f4ff",color:"#2563eb",fontWeight:700,outline:"none"}}>{propsFiltradas.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</select>
        {prop&&<>
          <div style={{display:"flex",gap:6,fontSize:12,flexWrap:"wrap"}}><span style={{background:"#f0f2f5",borderRadius:5,padding:"2px 9px",fontWeight:600}}>{prop.tipo}</span><span style={{color:"#dc3545",fontWeight:700}}>{prop.operacion}</span><span style={{color:"#6c757d",fontSize:11}}>{prop.cliente}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:"#6c757d"}}>CONTACTOS SEMANALES: {leadsSem.length}</p>
              {leadsSem.length>0?(()=>{
                const byAgent={};

function FormCliente({cliente,onSave,onClose}){
  const [f,setF]=useState(cliente||{nombre:"",telefono:"",email:"",recomendado_por:"",observaciones:""});
  const [saving,setSaving]=useState(false);
  const [creatingFolder,setCreatingFolder]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleCreateDriveFolder=()=>{
    if(!prop?.id)return;
    const nombreCarpeta=`${prop.id} ${prop.tipo||""} ${prop.nombre||""}`.trim();
    onCreateFolder(nombreCarpeta,prop.id);
  };

  const handleSave=async()=>{
    if(!f.nombre.trim()){alert("El nombre es obligatorio");return;}
    setSaving(true);
    const data={nombre:f.nombre,telefono:f.telefono||null,email:f.email||null,recomendado_por:f.recomendado_por||null,observaciones:f.observaciones||null,updated_at:new Date().toISOString()};
    let err;
    if(cliente?.id){({error:err}=await sb.from("clientes").update(data).eq("id",cliente.id));}
    else{({error:err}=await sb.from("clientes").insert({...data,created_at:new Date().toISOString()}));}
    setSaving(false);
    if(err){alert("Error: "+err.message);}else{onSave();}
  };
  return <div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
    <div className="form-group" style={{gridColumn:"1/-1"}}><label>Nombre y Apellido *</label><input className="form-control" value={f.nombre} onChange={e=>set("nombre",e.target.value)}/></div>

    <div className="form-group"><label>Email</label><input className="form-control" type="email" value={f.email||""} onChange={e=>set("email",e.target.value)}/></div>
    <div className="form-group" style={{gridColumn:"1/-1"}}><label>Recomendado por</label><input className="form-control" value={f.recomendado_por||""} onChange={e=>set("recomendado_por",e.target.value)}/></div>

  </div>

  </div></div>;
}

function GestionAgentes({agentes,onRefresh,toast}){
  const [editId,setEditId]=useState(null);const [editNombre,setEditNombre]=useState("");const [editColor,setEditColor]=useState("#1D9E75");
  const [newId,setNewId]=useState("");const [newNombre,setNewNombre]=useState("");const [newColor,setNewColor]=useState("#2563eb");
  const [saving,setSaving]=useState(false);
  const startEdit=(ag)=>{setEditId(ag.id);setEditNombre(ag.nombre);setEditColor(ag.color||"#1D9E75");};
  const saveEdit=async()=>{
    setSaving(true);
    const{error}=await sb.from("agentes").update({nombre:editNombre,color:editColor,updated_at:new Date().toISOString()}).eq("id",editId);
    setSaving(false);
    if(error){alert(error.message);}else{setEditId(null);onRefresh();toast("Agente actualizado","success");}
  };
  const addAgente=async()=>{
    if(!newNombre.trim()||!newId.trim()){alert("Completá nombre e iniciales");return;}
    setSaving(true);
    const{error}=await sb.from("agentes").insert({id:newId.toUpperCase().slice(0,3),nombre:newNombre,color:newColor,activo:true,created_at:new Date().toISOString()});
    setSaving(false);
    if(error){alert(error.message);}else{setNewNombre("");setNewId("");onRefresh();toast("Agente agregado","success");}
  };
  const deleteAgente=async(id)=>{
    if(!confirm(`¿Eliminar agente ${id}?`))return;
    await sb.from("propiedades").update({agente_id:null}).eq("agente_id",id);
    await sb.from("leads").update({agente_id:null}).eq("agente_id",id);
    await sb.from("visitas").update({agente_id:null}).eq("agente_id",id);
    const{error}=await sb.from("agentes").delete().eq("id",id);
    if(error){alert(error.message);}else{onRefresh();toast("Agente eliminado","success");}
  };
  return <div>
    <p style={{textAlign:"center",fontWeight:800,fontSize:17,margin:"0 0 1.25rem"}}>GESTIÓN DE AGENTES</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
      <div>
        <p style={{fontWeight:700,fontSize:14,margin:"0 0 1rem",color:"#6c757d"}}>Agentes registrados</p>
        {agentes.map(ag=><div key={ag.id} className="card" style={{marginBottom:10}}>
          {editId===ag.id?<div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:editColor,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>{ag.id}</div>
              <div style={{flex:1}}>
                <input value={editNombre} onChange={e=>setEditNombre(e.target.value)} style={{width:"100%",padding:"6px 10px",border:"1.5px solid #2563eb",borderRadius:6,fontSize:13,outline:"none",marginBottom:6}}/>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#6c757d"}}>Color:</span><input type="color" value={editColor} onChange={e=>setEditColor(e.target.value)} style={{width:32,height:24,border:"none",borderRadius:4,cursor:"pointer"}}/></div>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button className="btn btn-primary" style={{flex:1,padding:"6px"}} onClick={saveEdit} disabled={saving}>{saving?"Guardando...":"✓ Guardar"}</button>
              <button className="btn btn-secondary" style={{padding:"6px 12px"}} onClick={()=>setEditId(null)}>Cancelar</button>
            </div>
          </div>:<div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:ag.color||"#888",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:14}}>{ag.id}</div>
            <div style={{flex:1}}><p style={{margin:0,fontWeight:700,fontSize:15}}>{ag.nombre}</p><p style={{margin:0,fontSize:11,color:"#adb5bd"}}>ID: {ag.id}</p></div>
            <button className="btn btn-secondary" style={{padding:"5px 10px",fontSize:12}} onClick={()=>startEdit(ag)}>✏️ Editar</button>
            <button style={{padding:"5px 8px",fontSize:12,borderRadius:6,border:"1px solid #f1aeb5",background:"#fff0f1",color:"#842029",cursor:"pointer"}} onClick={()=>deleteAgente(ag.id)}>🗑️</button>
          </div>}
        </div>)}
      </div>
      <div className="card">
        <p style={{fontWeight:700,fontSize:14,margin:"0 0 1rem",color:"#6c757d"}}>Agregar nuevo agente</p>
        <div className="form-group"><label>Iniciales (ID) *</label><input className="form-control" value={newId} onChange={e=>setNewId(e.target.value.toUpperCase().slice(0,3))} placeholder="Ej: AG" maxLength={3}/></div>
        <div className="form-group"><label>Nombre completo *</label><input className="form-control" value={newNombre} onChange={e=>setNewNombre(e.target.value)} placeholder="Ej: Ana García"/></div>
        <div className="form-group"><label>Color del avatar</label><div style={{display:"flex",alignItems:"center",gap:10}}><input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{width:40,height:32,border:"none",borderRadius:6,cursor:"pointer"}}/><div style={{width:36,height:36,borderRadius:"50%",background:newColor,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13}}>{newId||"AG"}</div></div></div>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={addAgente} disabled={saving}>{saving?"Guardando...":"+ Agregar agente"}</button>
      </div>
    </div>
  </div>;
}

const [clientes,setClientes]=useState(CLIENTES_INICIAL);
  const [loading,setLoading]=useState(false);
  const [toastState,setToastState]=useState(null);
  const [dashTab,setDashTab]=useState("panel");const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [menuOpen,setMenuOpen]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setAuthLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);

  const showToast=(msg,type="success")=>setToastState({msg,type});

  const fetchAllLeads=async()=>{
    const ps=1000;let all=[],from=0;
    while(true){
      const{data,error}=await sb.from("leads").select("*").order("fecha",{ascending:false}).range(from,from+ps-1);
      if(error||!data||data.length===0)break;
      all=[...all,...data];
      if(data.length<ps)break;
      from+=ps;
    }
    return all;
  };
  const loadAll=useCallback(async()=>{
    setLoading(true);
    const [r1,r3,r4,r5,r6]=await Promise.all([
      sb.from("propiedades").select("*").order("id"),
      sb.from("visitas").select("*").order("fecha",{ascending:false}),
      sb.from("metricas_portales").select("*").order("anio").order("mes"),
      sb.from("agentes").select("*").order("nombre"),
      sb.from("clientes").select("*").order("nombre"),
    ]);
    const leadsAll=await fetchAllLeads();
    if(r1.data&&r1.data.length>0)setProps(r1.data);
    if(leadsAll.length>0)setLeads(leadsAll);
    if(r3.data)setVisitas(r3.data);
    if(r4.data&&r4.data.length>0)setMetricas(r4.data);
    if(r5.data&&r5.data.length>0)setAgentes(r5.data);
    if(r6.data&&r6.data.length>0)setClientes(r6.data);
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadAll();},[user]);
  const goNav=(id)=>{setPagina(id);setPropSel(null);setMenuOpen(false);setDashTab(id==="estado-propiedades"?"publicaciones":"panel");};
  const nav=[
    {id:"dashboard",icon:"🏠",label:"Dashboard",sub:[{id:"panel-control",label:"Panel de Control"},{id:"estado-propiedades",label:"Estado de Propiedades"}]},
    {id:"propiedades",icon:"🏢",label:"Propiedades"},
    {id:"metricas",icon:"📡",label:"Impactos"},
    {id:"leads",icon:"👥",label:"Contactos"},
    {id:"visitas",icon:"📅",label:"Visitas"},
    {id:"analytics",icon:"📈",label:"Analytics",sub:[{id:"analytics-kpis",label:"KPIs Venta"},{id:"analytics-cartera",label:"Cartera"},{id:"analytics-agentes",label:"Agentes"}]},
    {id:"clientes",icon:"🏛️",label:"Clientes"}
  ];
  if(authLoading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f6fa"}}><div style={{fontSize:16,color:"#6c757d"}}>Cargando...</div></div>;
  if(!user)return <LoginScreen onLogin={()=>loadAll()}/>;
  return <div style={{display:"flex",minHeight:"100vh"}}>
    <button className="hamburger" onClick={()=>setMenuOpen(!menuOpen)}><span/><span/><span/></button>
    {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:150}}/>}
    <nav className={`sidebar${menuOpen?" open":""}`} style={{width:210,flexShrink:0,background:"#fff",borderRight:"1.5px solid #e4e8f0",padding:"1.25rem .85rem",display:"flex",flexDirection:"column",position:"fixed",height:"100vh",overflowY:"auto",zIndex:100,boxShadow:"2px 0 12px rgba(0,0,0,.04)"}}>
      <div style={{marginBottom:"1.5rem",padding:"0 4px"}}><Logo/><div style={{height:1,background:"#f0f2f5",marginTop:12}}/></div>

        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#f8f9fc",borderRadius:9}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:"#CC2229",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:11,flexShrink:0}}>{(user?.email||"JM").slice(0,2).toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}><p style={{margin:0,fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email||""}</p><p style={{margin:0,fontSize:10,color:"#adb5bd"}}>Conectado</p></div>
        </div>
        <div style={{padding:"6px 10px"}}><p style={{margin:0,fontSize:10,color:"#adb5bd"}}>{props.length} propiedades · {leads.length} contactos</p><p style={{margin:0,fontSize:10,color:"#1D9E75"}}>● Supabase</p></div>
        <button onClick={async()=>{await sb.auth.signOut();setUser(null);}} style={{margin:"4px 10px 0",padding:"7px",background:"#fff0f1",border:"1px solid #f1aeb5",borderRadius:7,color:"#842029",fontSize:12,fontWeight:600,cursor:"pointer",width:"calc(100% - 20px)"}}>← Cerrar sesión</button>
        <button onClick={async()=>{
          try{
            const [r1,r2,r3,r4,r5,r6]=await Promise.all([
              sb.from("propiedades").select("*").order("id"),
              sb.from("leads").select("*").order("fecha",{ascending:false}),
              sb.from("visitas").select("*").order("fecha",{ascending:false}),
              sb.from("metricas_portales").select("*").order("anio").order("mes"),
              sb.from("clientes").select("*").order("nombre"),
              sb.from("agentes").select("*").order("nombre"),
            ]);
            const backup={
              fecha_backup:new Date().toISOString(),
              version:"SOCOSI-CRM-1.0",
              propiedades:r1.data||[],
              contactos:r2.data||[],
              visitas:r3.data||[],
              metricas_portales:r4.data||[],
              clientes:r5.data||[],
              agentes:r6.data||[],
              totales:{
                propiedades:(r1.data||[]).length,
                contactos:(r2.data||[]).length,
                visitas:(r3.data||[]).length,
                metricas:(r4.data||[]).length,
                clientes:(r5.data||[]).length,
              }
            };
            const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;
            a.download="SOCOSI-backup-"+new Date().toISOString().slice(0,10)+".json";
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("Backup descargado correctamente.");
          }catch(e){alert("Error al generar backup: "+e.message);}
        }} style={{margin:"4px 10px 0",padding:"7px",background:"#e8f5e9",border:"1px solid #A5D6A7",borderRadius:7,color:"#0A5C34",fontSize:12,fontWeight:600,cursor:"pointer",width:"calc(100% - 20px)"}}>
          💾 Descargar backup
        </button>
      </div>
    </nav>
    <main className="main-content" style={{marginLeft:210,flex:1,padding:"1.75rem 2.25rem",overflowY:"auto",minHeight:"100vh"}}>
      {loading?<Spin/>:<>
        {(pagina==="panel-control"||pagina==="estado-propiedades")&&<Dashboard props={props} leads={leads} visitas={visitas} metricas={metricas} onNav={goNav} activeTab={pagina}/>}
        {pagina==="propiedades"&&!propSel&&<Propiedades props={props} agentes={agentes} clientes={clientes} onSelect={p=>setPropSel(p)} onRefresh={loadAll} toast={showToast} user={user}/>}
        {pagina==="propiedades"&&propSel&&<PropDetalle prop={propSel} leads={leads} visitas={visitas} metricas={metricas} agentes={agentes} onBack={()=>setPropSel(null)} onRefresh={loadAll} toast={showToast}/>}
        {pagina==="leads"&&<LeadsPage leads={leads} props={props} agentes={agentes} onRefresh={loadAll} toast={showToast}/>}
        {pagina==="visitas"&&<VisitasPage visitas={visitas} props={props} leads={leads} agentes={agentes} onRefresh={loadAll} toast={showToast}/>}
        {pagina==="metricas"&&<MetricasPage metricas={metricas} props={props} onRefresh={loadAll} toast={showToast}/>}
        {(pagina==="analytics"||pagina==="analytics-kpis"||pagina==="analytics-cartera"||pagina==="analytics-agentes")&&<Analytics props={props} leads={leads} visitas={visitas} metricas={metricas} agentes={agentes} onRefresh={loadAll} toast={showToast} initTab={pagina}/>}
        
        {pagina==="clientes"&&<ClientesPage clientes={clientes} onRefresh={loadAll} toast={showToast}/>}
      </>}
    </main>
    {toastState&&<Toast msg={toastState.msg} type={toastState.type} onClose={()=>setToastState(null)}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
